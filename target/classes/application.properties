spring.datasource.url=jdbc:mysql://atlasschool-atlasschool.i.aivencloud.com:22389/defaultdb?useSSL=true&requireSSL=true
spring.datasource.username=avnadmin
spring.datasource.password=AVNS_5mA-2MPKIYLeZ8HIyC0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# update -> auto creates/updates tables based on entities. Good for dev.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false



# ---------- Resend (for sending OTP emails) ----------
# NOTE: We use Resend's HTTPS API instead of Gmail SMTP because Railway (and
# most cloud hosts) block outbound SMTP ports (25/465/587) by default, which
# caused OTP emails to silently time out. Resend's API runs over HTTPS (443),
# which is never blocked.
#
# Setup:
#  1. Sign up at https://resend.com (free tier: 3,000 emails/month)
#  2. Get your API key from the "API Keys" page (starts with "re_")
#  3. For testing: use app.resend.from=onboarding@resend.dev (only delivers
#     to the email on your Resend account)
#  4. For production: verify your own domain under "Domains" in Resend, then
#     set app.resend.from to an address on that domain, e.g.
#     "ATLAS Academy <noreply@thebohothread.in>"
app.resend.api-key=re_XnEgxoKy_PT6nzPBDLnQNhBtE5SzADbEw
app.resend.from=ATLAS Academy <noreply@thebohothread.in>

app.mail.from-name=ATLAS Academy



# ---------- OTP Settings ----------
app.otp.length=6
app.otp.expiry-minutes=5
# Max OTP requests allowed per email within the cooldown window (basic spam guard)
app.otp.resend-cooldown-seconds=60

# ---------- JWT ----------
# Generate your own long random secret for production! (this is just a dev placeholder)
app.jwt.secret=ChangeThisToALongRandomSecretKeyAtLeast256BitsForHS256AlgoSecurity
app.jwt.expiration-ms=86400000

# ---------- CORS ----------
# Add your deployed frontend URL(s) here, comma separated
app.cors.allowed-origins=https://thebohothread.in,https://www.thebohothread.in

# ---------- File upload (gallery images) ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

